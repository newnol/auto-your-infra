---
- name: Deploy Applications
  hosts: apps
  become: yes
  vars:
    ansible_python_interpreter: /usr/bin/python3
  tasks:
    - name: "Example Task: Ensure app directory exists"
      file:
        path: "/opt/custom-app"
        state: directory
        mode: '0755'
        
