[proxmox_servers]
# IMPORTANT: Replace <ASUS_IP_ADDRESS> with the actual IP address of your "asus" node
# You can find this in Proxmox UI: Datacenter -> asus -> Summary -> IP Address
asus ansible_host=192.168.1.101 ansible_user=root

[proxmox_servers:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# Dynamic inventory for VMs (sẽ được tạo bởi Terraform)
[webservers]
# VMs sẽ được thêm vào đây sau khi Terraform tạo

[databases]
# Database VMs sẽ được thêm vào đây
