---
name: IaC Lint

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint on Ansible files
        run: yamllint ansible/

  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Run ansible-lint
        run: ansible-lint ansible/

  terraform-fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive
        working-directory: terraform/

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: tflint --recursive
        working-directory: terraform/

  terraform-validate:
    name: terraform validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform/

      - name: Terraform Validate
        run: |
          terraform validate \
            -var="proxmox_api_url=https://example.com:8006/api2/json" \
            -var="proxmox_api_user=root@pam" \
            -var="proxmox_api_pass=placeholder"
        working-directory: terraform/
